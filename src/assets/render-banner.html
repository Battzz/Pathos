<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0E0E0E; }
  #banner {
    position: relative;
    overflow: hidden;
    background: #0E0E0E;
  }
  .icon {
    position: absolute;
    width: 112px;
    height: 112px;
    background-image: url("/favicon.png");
    background-size: contain;
    background-repeat: no-repeat;
    opacity: 0;
    transform: translate3d(0, 0, 0) scale(0.88) rotate(-10deg);
    animation: icon-drift 4.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }
  @keyframes icon-drift {
    0% {
      opacity: 0;
      transform: translate3d(-8px, 12px, 0) scale(0.88) rotate(-10deg);
    }
    18% {
      opacity: 0.7;
    }
    56% {
      opacity: 0.38;
      transform: translate3d(10px, -10px, 0) scale(1) rotate(8deg);
    }
    100% {
      opacity: 0;
      transform: translate3d(18px, -18px, 0) scale(0.92) rotate(16deg);
    }
  }
</style>
</head>
<body>
<div id="banner"></div>
<script>
const W = window.innerWidth, H = window.innerHeight;
const banner = document.getElementById("banner");
banner.style.width = `${W}px`;
banner.style.height = `${H}px`;

const CELL = 176;
const COLS = Math.ceil(W / CELL) + 2;
const ROWS = Math.ceil(H / CELL) + 2;
const OX = Math.round((W - COLS * CELL) / 2);
const OY = Math.round((H - ROWS * CELL) / 2);

for (let row = 0; row < ROWS; row++) {
  for (let col = 0; col < COLS; col++) {
    const icon = document.createElement("div");
    icon.className = "icon";
    icon.style.left = `${OX + col * CELL + (row % 2) * 44}px`;
    icon.style.top = `${OY + row * CELL}px`;
    icon.style.animationDelay = `${-((row * 0.7 + col * 0.45) % 4.8)}s`;
    banner.appendChild(icon);
  }
}

window.__ready = true;
</script>
</body>
</html>
